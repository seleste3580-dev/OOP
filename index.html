<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seleste Technologies | Rust & Embedded Academy</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Animated Neon Background -->
    <div class="bg-container">
        <div class="neon-grid"></div>
        <div class="floating-text">SELESTE TECHNOLOGIES</div>
    </div>

    <nav class="navbar">
        <div class="logo">SELESTE <span>TECHNOLOGIES</span></div>
        <div class="nav-right">
            <input type="text" id="search" placeholder="Search lessons...">
            <div class="lesson-counter">Modules: <span id="count">0</span></div>
        </div>
    </nav>

    <header class="hero">
        <h1 class="glitch" data-text="MASTER THE MACHINE">MASTER THE MACHINE</h1>
        <p>Advanced Rust OOP, Embedded Systems, and Low-Level Architecture.</p>
        
        <div class="filter-group">
            <button class="filter-btn active" data-level="all">All Access</button>
            <button class="filter-btn" data-level="beginner">Beginner</button>
            <button class="filter-btn" data-level="intermediate">Intermediate</button>
            <button class="filter-btn" data-level="expert">Expert</button>
            <button class="filter-btn" data-level="guru">Guru</button>
        </div>
    </header>

    <main class="grid-container" id="lessonGrid">
        <!-- Lessons Injected via JS -->
    </main>
	<!-- Lesson Modal Overlay -->
<div id="lessonModal" class="modal">
    <div class="modal-content">
        <span class="close-btn">&times;</span>
        <div id="printableArea">
            <!-- This Header only shows on the PDF/Print -->
            <div class="pdf-stamp">
                <div class="stamp-logo">SELESTE TECHNOLOGIES</div>
                <div class="stamp-verified">OFFICIAL CURRICULUM • VERIFIED CONTENT</div>
            </div>
            
            <div id="modalBody">
                <!-- Content injected by JS -->
            </div>
        </div>
        <div class="modal-footer">
            <button onclick="downloadPDF()" class="btn-pdf">📥 Download Official PDF</button>
            <button onclick="copyCode()" class="btn-copy">📋 Copy Code Snippet</button>
        </div>
    </div>
</div>

	<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <script src="script.js"></script>
</body>
</html>
